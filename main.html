<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PUNYA RADE - UNIVERSAL ACCESS</title>
    <style>
        :root { --neon: #00ff00; --dark: #0a0a0a; --blue: #0088ff; }
        body { 
            background: var(--dark); color: var(--neon); 
            font-family: 'Courier New', monospace; 
            margin: 0; display: flex; justify-content: center; align-items: center; 
            min-height: 100vh;
        }
        .container { 
            width: 95%; max-width: 500px; 
            background: #000; border: 2px solid var(--neon); 
            border-radius: 15px; padding: 25px; 
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.2);
            box-sizing: border-box;
        }
        /* POPUP LOGIN STYLE */
        #login-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); display: flex;
            justify-content: center; align-items: center; z-index: 9999;
        }
        .login-box {
            width: 90%; max-width: 400px; padding: 30px;
            border: 2px solid var(--blue); border-radius: 15px;
            background: #050505; text-align: center;
        }
        h2 { text-align: center; font-size: 1.5rem; letter-spacing: 2px; margin-bottom: 25px; color: var(--neon); }
        h3 { color: var(--blue); margin-bottom: 20px; text-transform: uppercase; }
        
        .group { margin-bottom: 15px; text-align: left; }
        label { display: block; font-size: 0.8rem; margin-bottom: 8px; color: #666; }
        
        input, select { 
            width: 100%; padding: 15px; 
            background: #111; border: 1px solid #333; 
            color: #fff; font-size: 1rem; 
            border-radius: 8px; box-sizing: border-box; outline: none;
            transition: 0.3s;
        }
        input:focus { border-color: var(--neon); box-shadow: 0 0 10px rgba(0,255,0,0.2); }
        
        .btn-main { 
            width: 100%; padding: 18px; 
            background: var(--neon); color: #000; 
            border: none; border-radius: 8px; 
            font-size: 1.1rem; font-weight: bold; 
            cursor: pointer; margin-top: 10px;
        }
        .btn-login { background: var(--blue); color: #fff; }
        
        #log { 
            margin-top: 20px; padding: 15px; 
            background: #111; border-radius: 5px; 
            font-size: 0.8rem; text-align: center;
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-box">
        <h3>System Auth</h3>
        <p style="font-size: 0.7rem; color: #888; margin-bottom: 20px;">MASUKKAN KREDENSI FONNTE ANDA</p>
        <div class="group">
            <label>API TOKEN FONNTE</label>
            <input type="password" id="user-token" placeholder="Masukkan Token Anda">
        </div>
        <div class="group">
            <label>NOMOR WA ANDA (UNTUK SENDER)</label>
            <input type="number" id="user-sender" placeholder="628xxxxxxxx">
        </div>
        <button class="btn-main btn-login" onclick="saveAuth()">UNLOCK TERMINAL</button>
    </div>
</div>

<div class="container hidden" id="main-app">
    <h2>RADE COMMAND v4</h2>
    <p style="text-align: center; font-size: 0.6rem; color: #555; margin-top: -20px; margin-bottom: 20px;">SENDER ACTIVE: <span id="display-sender" style="color:var(--blue)"></span></p>

    <div class="group">
        <label>Nomor Target</label>
        <input type="number" id="phone" placeholder="08xxxxxxxx">
    </div>

    <div class="group">
        <label>Isi Pesan</label>
        <input type="text" id="msg" placeholder="Ketik pesan...">
    </div>

    <div class="group">
        <label>Burst Mode</label>
        <select id="amount">
            <option value="1">Kirim 1x</option>
            <option value="3">Kirim 3x</option>
            <option value="5">Kirim 5x</option>
            <option value="10">Kirim 10x</option>
        </select>
    </div>

    <button class="btn-main" onclick="startMission()">LAUNCH SPAM</button>
    <button onclick="logout()" style="background:none; border:none; color:red; font-size:0.7rem; margin-top:15px; width:100%; cursor:pointer;">[ EXIT / LOGOUT ]</button>

    <div id="log">Ready to process.</div>
</div>

<script>
    // CEK SESSION SAAT LOAD
    window.onload = function() {
        const savedToken = sessionStorage.getItem("rade_token");
        const savedSender = sessionStorage.getItem("rade_sender");
        if(savedToken && savedSender) {
            showApp(savedSender);
        }
    }

    function saveAuth() {
        const token = document.getElementById("user-token").value;
        let sender = document.getElementById("user-sender").value;

        if(!token || !sender) return alert("Wajib isi Token & Nomor WA!");
        
        if(sender.startsWith("0")) sender = "62" + sender.substring(1);

        sessionStorage.setItem("rade_token", token);
        sessionStorage.setItem("rade_sender", sender);
        
        showApp(sender);
    }

    function showApp(sender) {
        document.getElementById("login-overlay").classList.add("hidden");
        document.getElementById("main-app").classList.remove("hidden");
        document.getElementById("display-sender").innerText = "+" + sender;
    }

    function logout() {
        sessionStorage.clear();
        location.reload();
    }

    async function startMission() {
        const TOKEN = sessionStorage.getItem("rade_token");
        let target = document.getElementById("phone").value;
        const msg = document.getElementById("msg").value;
        const amount = parseInt(document.getElementById("amount").value);
        const log = document.getElementById("log");

        if (!target || !msg) return alert("Lengkapi target & pesan!");
        if (target.startsWith("0")) target = "62" + target.substring(1);

        log.innerHTML = "Initializing...";

        for (let i = 1; i <= amount; i++) {
            log.innerHTML = `Sending Command #${i}...`;
            
            try {
                const formData = new FormData();
                formData.append('target', target);
                formData.append('message', `[SYSTEM]: ${msg}`);

                const response = await fetch('https://api.fonnte.com/send', {
                    method: 'POST',
                    headers: { 'Authorization': TOKEN },
                    body: formData
                });
                
                const res = await response.json();
                
                if (res.status) {
                    log.innerHTML = `<span style="color:#0f0">Success #${i}</span>`;
                } else {
                    log.innerHTML = `<span style="color:red">Failed #${i}: ${res.reason}</span>`;
                    break;
                }
            } catch (e) {
                log.innerHTML = `<span style="color:red">Error Connection</span>`;
                break;
            }
            if(amount > 1) await new Promise(r => setTimeout(r, 1200));
        }
        log.innerHTML += "<br><b>MISSION COMPLETE.</b>";
    }
</script>

</body>
</html>
